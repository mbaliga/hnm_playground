name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    name: Build & test (Linux / JVM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build core + desktopApp
        run: ./gradlew build --stacktrace

      - name: Run tests
        run: ./gradlew :core:jvmTest --stacktrace

      # NOTE: the Android app + controller-HID backends are not yet wired into the Gradle build
      # (they need the Android SDK / native toolchains). When :backend-android lands, add an
      # `android-actions/setup-android` step and `./gradlew :androidApp:assembleDebug` here. See
      # docs/MODULES.md.
