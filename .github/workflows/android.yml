name: Android APK

# Builds the on-device player as a debug APK on a runner that has the Android SDK (this repo's dev
# container does not), and publishes it as a downloadable Release asset under a rolling tag so it can
# be installed straight onto a phone.

on:
  push:
    branches: [claude/haptics-audio-workbench-lgmpsf, main]
    paths:
      - 'androidApp/**'
      - 'core/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'settings.gradle.kts'
      - '.github/workflows/android.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble debug APK
        run: ./gradlew :androidApp:assembleDebug --stacktrace

      - name: Stage APK
        id: stage
        run: |
          set -e
          apk=$(find androidApp/build/outputs/apk/debug -name '*.apk' | head -1)
          echo "Found APK at: $apk"
          mkdir -p dist
          cp "$apk" dist/haptics-player-debug.apk
          echo "apk=dist/haptics-player-debug.apk" >> "$GITHUB_OUTPUT"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: haptics-player-debug-apk
          path: ${{ steps.stage.outputs.apk }}

      - name: Publish APK to a rolling release
        if: github.ref_name == 'claude/haptics-audio-workbench-lgmpsf' || github.ref_name == 'main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-player-debug
          name: Haptics Player (debug APK)
          body: |
            Debug build of the on-device haptics + audio player, rebuilt automatically from
            `${{ github.sha }}`.

            Install on a phone (Android 12+): download `haptics-player-debug.apk` below, then open it
            and allow installation from this source. It's a debug build — unsigned for the Play Store,
            fine for sideloading.
          prerelease: true
          files: ${{ steps.stage.outputs.apk }}
