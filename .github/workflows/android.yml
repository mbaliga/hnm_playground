name: Android APK

# Builds the on-device player as a debug APK on a runner that has the Android SDK (this repo's dev
# container does not), and publishes it as a downloadable Release asset under a rolling tag so it can
# be installed straight onto a phone.

on:
  push:
    branches: [claude/haptics-audio-workbench-lgmpsf, main]
    paths:
      - 'androidApp/**'
      - 'core/**'
      - 'ui/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'settings.gradle.kts'
      - '.github/workflows/android.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble debug APK
        run: ./gradlew :androidApp:assembleDebug --stacktrace

      - name: Stage APK
        id: stage
        run: |
          set -e
          apk=$(find androidApp/build/outputs/apk/debug -name '*.apk' | head -1)
          echo "Found APK at: $apk"
          # Version the filename (versionName + short SHA) so every build is a distinct download URL —
          # a fixed name gets served from the browser/download-manager cache and you keep getting the
          # old APK.
          ver=$(grep -oP 'versionName = "\K[^"]+' androidApp/build.gradle.kts | head -1)
          short=$(echo "${GITHUB_SHA}" | cut -c1-7)
          name="haptics-player-v${ver}-${short}.apk"
          mkdir -p dist
          cp "$apk" "dist/${name}"
          echo "apk=dist/${name}" >> "$GITHUB_OUTPUT"
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "ver=${ver}" >> "$GITHUB_OUTPUT"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: haptics-player-debug-apk
          path: ${{ steps.stage.outputs.apk }}

      - name: Publish APK to a rolling release
        if: github.ref_name == 'claude/haptics-audio-workbench-lgmpsf' || github.ref_name == 'main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-player-debug
          name: Haptics Player (debug APK)
          body: |
            **Latest build: v${{ steps.stage.outputs.ver }}** (`${{ github.sha }}`)

            ⬇️ Direct download (a fresh, version-stamped URL each build so it's never cache-served):
            https://github.com/mbaliga/hnm_playground/releases/download/android-player-debug/${{ steps.stage.outputs.name }}

            Install on a phone (Android 12+): download the APK below, open it, allow installation from
            this source. Debug build — unsigned for the Play Store, fine for sideloading. Confirm the
            in-app top line shows the matching `build vX` after installing.
          prerelease: true
          files: ${{ steps.stage.outputs.apk }}
